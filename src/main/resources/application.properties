spring.application.name=nailed_BE

spring.datasource.url=jdbc:mysql://localhost:3306/nailed_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false

jwt.secret=nailed-secret-key-must-be-32-chars-or-longer
jwt.access-token-expiration=1800000
jwt.refresh-token-expiration=604800000

resend.api-key=${RESEND_API_KEY:}
resend.from-email=Nailed <onboarding@resend.dev>

# ─── KakaoPay (테스트용) ──────────────────────────────
kakao.pay.secret-key=DEV_TEST_SECRET_KEY
kakao.pay.cid=TC0ONETIME
kakao.pay.approval-url=http://localhost:8080/api/payments/kakao/approve
kakao.pay.cancel-url=http://localhost:8080/api/payments/kakao/cancel
kakao.pay.fail-url=http://localhost:8080/api/payments/kakao/fail