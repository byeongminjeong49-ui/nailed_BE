spring.application.name=nailed_BE

spring.datasource.url=jdbc:mysql://localhost:3306/nailed_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false

kakao.pay.secret-key=DEV_TEST_SECRET_KEY
kakao.pay.cid=TC0ONETIME
kakao.pay.approval-url=http://localhost:8080/api/payments/kakao/approve
kakao.pay.cancel-url=http://localhost:8080/api/payments/kakao/cancel
kakao.pay.fail-url=http://localhost:8080/api/payments/kakao/fail

jwt.secret=nailed-local-development-secret-key-minimum-32-bytes
jwt.access-token-validity-ms=3600000
jwt.refresh-token-validity-ms=604800000

file.upload.path=${UPLOAD_DIR:./data/uploads}
file.static.product.path=${PRODUCT_IMAGE_DIR:./data/images/products}
app.profile-image.upload-dir=${PROFILE_IMAGE_DIR:./data/images/profileImg}
app.profile-image.base-url=/images/profileImg
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true